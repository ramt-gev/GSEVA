server {
    listen 80;
    server_name ramthangaraj.com www.ramthangaraj.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ramthangaraj.com www.ramthangaraj.com;

    ssl_certificate     /etc/letsencrypt/live/ramthangaraj.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ramthangaraj.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # API — proxied to Node
    location /api {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade     $http_upgrade;
        proxy_set_header   Connection  'upgrade';
        proxy_set_header   Host        $host;
        proxy_set_header   X-Real-IP   $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
        client_max_body_size 10m;
    }

    # QR pass images — proxied to Node (public, no auth)
    location /api/gate/image {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Cache-Control "public, max-age=86400";
    }

    # Frontend — static HTML files
    location / {
        root  /var/www/gev-icms/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options       SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection      "1; mode=block";
    add_header Referrer-Policy       strict-origin-when-cross-origin;
}
